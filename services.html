<div class="w3-container w3-padding-32 w3-pale-blue">
<p class="w3-monospace">Please Enter Details for the book You would like to order.</p>
<form class="w3-card w3-padding w3-light-gray">


<label class="w3-monospace">Book Name</label>
<input type="text" class="w3-input w3-border">
</input>
<br>
<label class="w3-monospace"> Book Quantity</label>
<input type ="number" class="w3-input w3-border">
</input>
<br>
<label class="w3-monospace">Address</label>
<textarea class="w3-input w3-border" w3-monospace>
</textarea>
<br>
<label class="w3-monospace">Email</label>
<input type="Email" class="w3-input w3-border">
 </input>
<br>
<p><b>Payment Type:</b></p>

<input type="radio" id="cash" name="payment" value="Cash">
<label for="cash">Cash</label><br>

<input type="radio" id="credit" name="payment" value="Credit Card">
<label for="credit">Credit Card</label><br>

<input type="radio" id="debit" name="payment" value="Debit Card">
<label for="debit">Debit Card</label><br>

<input type="radio" id="online" name="payment" value="Online Banking">
<label for="online">Online Banking</label>
<br><br><br>
<input type="submit" value="Submit" class="w3-button w3-blue"></input>
<div class="w3-right">
    <button type="reset" class="w3-button w3-red">
        Reset Form
    </button>
</div>
</form>
